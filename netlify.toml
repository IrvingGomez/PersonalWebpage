[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.58.3"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[[redirects]]
  from = "http://irvinggomez.com/*"
  to = "https://irvinggomez.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.irvinggomez.com/*"
  to = "https://irvinggomez.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.irvinggomez.com/*"
  to = "https://irvinggomez.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://irvinggomez.netlify.app/*"
  to = "https://irvinggomez.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://irvinggomez.netlify.app/*"
  to = "https://irvinggomez.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
  for = "index.xml"
  [headers.values]
    Content-Type = "application/rss+xml"
